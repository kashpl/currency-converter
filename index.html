<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Pro | Real-time Exchange Rates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <h1>Currency Converter</h1>
        <p>Live exchange rates with a cleaner and smarter experience.</p>
      </div>

      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        🌙
      </button>
    </header>

    <section class="card">
      <div class="field">
        <label for="amount">Amount</label>
        <input type="number" id="amount" min="0" step="0.01" value="1.00" placeholder="Enter amount">
      </div>

      <div class="currency-grid">
        <div class="field">
          <label for="from-currency">From</label>
          <select id="from-currency">
            <option value="USD" selected>USD - US Dollar</option>
            <option value="BRL">BRL - Brazilian Real</option>
            <option value="EUR">EUR - Euro</option>
            <option value="BTC">BTC - Bitcoin</option>
          </select>
        </div>

        <div class="swap-wrap">
          <button id="swap-button" class="swap-button" aria-label="Swap currencies">⇄</button>
        </div>

        <div class="field">
          <label for="to-currency">To</label>
          <select id="to-currency">
            <option value="BRL" selected>BRL - Brazilian Real</option>
            <option value="USD">USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="BTC">BTC - Bitcoin</option>
          </select>
        </div>
      </div>

      <button id="convert-button" class="main-button">Convert now</button>

      <div id="feedback" class="feedback hidden" role="alert"></div>

      <section id="result-box" class="result-box hidden">
        <p class="result-label">Converted value</p>
        <h2 id="final-result">0.00</h2>
        <p id="rate-details" class="rate-details">Waiting for conversion...</p>
        <p id="last-update" class="last-update">Last update: --</p>
      </section>
    </section>

    <section class="card history-card">
      <div class="history-header">
        <h3>Recent conversions</h3>
        <button id="clear-history" class="ghost-button">Clear</button>
      </div>

      <ul id="history-list" class="history-list">
        <li class="empty-history">No conversions yet.</li>
      </ul>
    </section>

    <footer class="footer">
      <p>Market data powered by AwesomeAPI</p>
      <p>Built for portfolio projects on GitHub</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
